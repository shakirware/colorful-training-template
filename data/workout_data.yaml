- week_1:
    # Week 1 (Calendar): Starts mid-week. Contains only the sessions for this calendar week.
    - weekday: Thursday
      session: WP Heavy + Dip Volume
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - reps: "1x1"
              percentage_1rm: 85
              notes: "Heavy single to start the week."
            - reps: "4x3"
              percentage_1rm: 80
              notes: "Back-off sets. Rest 2-3 mins."
        - name: Weighted Dips
          sets:
            - reps: "4x5"
              percentage_1rm: 70
              notes: "Volume work. Keep reps clean. Rest 2 mins."
        - name: Optional Cuff/Face-Pulls
          sets:
            - reps: "2x15"
              notes: "Focus on shoulder health. Not for fatigue."
    - weekday: Saturday
      session: Dip Heavy + WP Volume + MU Tech
      exercises:
        - name: Weighted Dips
          sets:
            - reps: "1x1"
              percentage_1rm: 87.5
              notes: "Heavy single."
            - reps: "4x3"
              percentage_1rm: 82.5
              notes: "Back-off sets. Rest 2-3 mins."
        - name: Weighted Pull-Ups
          sets:
            - reps: "3x5"
              percentage_1rm: 70
              notes: "Volume work. Keep reps clean. Rest 2 mins."
        - name: Weighted Muscle-Ups
          sets:
            - reps: "6x1"
              percentage_1rm: 60
              notes: "Technique singles. Take long rests (2-3 mins)."

- week_2:
    # Week 2 (Calendar): Begins with Monday's session from Training Cycle 1, then starts Training Cycle 2.
    - weekday: Monday
      session: Squat Heavy + Hinge
      exercises:
        - name: Squat
          sets:
            - reps: "1x1"
              percentage_1rm: 85
              notes: "Heavy single to complete Training Cycle 1."
            - reps: "1x4"
              percentage_1rm: 80
              notes: "Top set of 4."
            - reps: "3x4"
              percentage_1rm: 75
              notes: "Volume back-off sets. Rest 3-4 mins."
        - name: RDL/SLDL
          sets:
            - reps: "2x6"
              notes: "Use a weight leaving 2-3 Reps in Reserve (RIR)."
    - weekday: Thursday
      session: WP Heavy + Dip Volume
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - reps: "1x1"
              percentage_1rm: 87.5
              notes: "Single +2.5% from last week."
            - reps: "4x3"
              percentage_1rm: 82.5
              notes: "Back-offs +2.5%. If neck/elbows >4/10, hold last week's load and do 3 sets instead of 4."
        - name: Weighted Dips
          sets:
            - reps: "4x5"
              percentage_1rm: 72.5
              notes: "Volume work +2.5%."
        - name: Optional Cuff/Face-Pulls
          sets:
            - reps: "2x15"
              notes: "Focus on shoulder health."
    - weekday: Saturday
      session: Dip Heavy + WP Volume + MU Tech
      exercises:
        - name: Weighted Dips
          sets:
            - reps: "1x1"
              percentage_1rm: 90
              notes: "Single +2.5% from last week."
            - reps: "4x3"
              percentage_1rm: 85
              notes: "Back-offs +2.5%. If neck/elbows >4/10, hold last week's load and do 3 sets instead of 4."
        - name: Weighted Pull-Ups
          sets:
            - reps: "3x5"
              percentage_1rm: 72.5
              notes: "Volume work +2.5%."
        - name: Weighted Muscle-Ups
          sets:
            - reps: "6x1"
              percentage_1rm: 60
              notes: "Technique singles. Long rests, crisp turnover."

- week_3:
    # Week 3 (Calendar): Completes Training Cycle 2, starts Training Cycle 3 (Peak).
    - weekday: Monday
      session: Squat Heavy + Hinge
      exercises:
        - name: Squat
          sets:
            - reps: "1x1"
              percentage_1rm: 87.5
              notes: "Single +2.5% from last week."
            - reps: "1x4"
              percentage_1rm: 82.5
              notes: "Top set +2.5%."
            - reps: "3x4"
              percentage_1rm: 77.5
              notes: "Back-offs +2.5%."
        - name: RDL/SLDL
          sets:
            - reps: "2x6"
              notes: "Use a weight leaving 2-3 RIR."
    - weekday: Thursday
      session: WP Heavy + Dip Volume
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - reps: "1x1"
              percentage_1rm: 90
              notes: "Single at 90% if bar speed is good; otherwise hold at 87.5%."
            - reps: "4-5x3"
              percentage_1rm: 82.5
              notes: "Add one extra set ONLY if this is your better-recovering lift. Otherwise do 4x3."
        - name: Weighted Dips
          sets:
            - reps: "4x5"
              percentage_1rm: 75
              notes: "Volume work."
        - name: Optional Cuff/Face-Pulls
          sets:
            - reps: "2x15"
              notes: "Focus on shoulder health."
    - weekday: Saturday
      session: Dip Heavy + WP Volume + MU Tech
      exercises:
        - name: Weighted Dips
          sets:
            - reps: "1x1"
              percentage_1rm: 92.5
              notes: "Single at 92.5% if bar speed is good; otherwise hold at 90%."
            - reps: "4-5x3"
              percentage_1rm: 85
              notes: "Add one extra set ONLY if this is your better-recovering lift. Otherwise do 4x3."
        - name: Weighted Pull-Ups
          sets:
            - reps: "3x5"
              percentage_1rm: 72.5
              notes: "Volume work."
        - name: Weighted Muscle-Ups
          sets:
            - reps: "6x1"
              percentage_1rm: 65
              notes: "Technique singles. Long rests."

- week_4:
    # Week 4 (Calendar): Completes Training Cycle 3, starts Training Cycle 4 (Reload).
    - weekday: Monday
      session: Squat Heavy + Hinge
      exercises:
        - name: Squat
          sets:
            - reps: "1x1"
              percentage_1rm: 90
              notes: "Single at 90% if bar speed is good; otherwise hold at 87.5%."
            - reps: "1x4"
              percentage_1rm: 82.5
              notes: "Top set."
            - reps: "3x4"
              percentage_1rm: 77.5
              notes: "Back-off sets."
        - name: RDL/SLDL
          sets:
            - reps: "2x6"
              notes: "RIR 2-3."
    - weekday: Thursday
      session: WP + Dip (Reload)
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - reps: "1x1"
              percentage_1rm: 80
              notes: "Easy single. No sets above RPE 7."
            - reps: "2x3"
              percentage_1rm: 75
              notes: "Reduced volume back-offs."
        - name: Weighted Dips
          sets:
            - reps: "2x5"
              percentage_1rm: 65
              notes: "Reduced volume. Stay well below RPE 7."
    - weekday: Saturday
      session: Dip + WP + MU (Reload)
      exercises:
        - name: Weighted Dips
          sets:
            - reps: "1x1"
              percentage_1rm: 80
              notes: "Easy single. No sets above RPE 7."
            - reps: "2x3"
              percentage_1rm: 75
              notes: "Reduced volume back-offs."
        - name: Weighted Pull-Ups
          sets:
            - reps: "2x5"
              percentage_1rm: 65
              notes: "Reduced volume."
        - name: Weighted Muscle-Ups
          sets:
            - reps: "4x1"
              percentage_1rm: 55
              notes: "Light technique work only."

- week_5:
    # Week 5 (Calendar): Completes Training Cycle 4, starts Training Cycle 5 (Intensify).
    - weekday: Monday
      session: Squat (Reload)
      exercises:
        - name: Squat
          sets:
            - reps: "1x1"
              percentage_1rm: 80
              notes: "Easy single. No sets above RPE 7."
            - reps: "2x4"
              percentage_1rm: 70
              notes: "Reduced volume back-offs."
    - weekday: Thursday
      session: WP Priority
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - reps: "1x1"
              percentage_1rm: 92.5
              notes: "Heavy single."
            - reps: "3x2-3"
              percentage_1rm: 85
              notes: "Low-rep strength back-offs."
        - name: Weighted Dips
          sets:
            - reps: "3x5"
              percentage_1rm: 70
              notes: "Volume/maintenance work. Keep it snappy."
    - weekday: Saturday
      session: Dip Priority
      exercises:
        - name: Weighted Dips
          sets:
            - reps: "1x1"
              percentage_1rm: 92.5
              notes: "Heavy single."
            - reps: "3x2-3"
              percentage_1rm: 85
              notes: "Low-rep strength back-offs."
        - name: Weighted Pull-Ups
          sets:
            - reps: "3x4"
              percentage_1rm: 72.5
              notes: "Volume/maintenance work."
        - name: Weighted Muscle-Ups
          sets:
            - reps: "5x1"
              percentage_1rm: 65
              notes: "Crisp singles. Rest as needed."

- week_6:
    # Week 6 (Calendar): Completes Training Cycle 5, starts Training Cycle 6 (Intensify 2).
    - weekday: Monday
      session: Squat Priority
      exercises:
        - name: Squat
          sets:
            - reps: "1x1"
              percentage_1rm: 90
              notes: "Heavy single."
            - reps: "3x3"
              percentage_1rm: 82.5
              notes: "Strength back-off sets."
        - name: Light Hinge (RDL/SLDL)
          sets:
            - reps: "2x5"
              percentage_1rm: 70
              notes: "Light technique focus, RIR 3."
    - weekday: Thursday
      session: WP Priority
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - reps: "1x1"
              percentage_1rm: 95
              notes: "Bump +1-2.5% from W5 single if it was <= RPE 8. Otherwise, repeat W5."
            - reps: "3x2"
              percentage_1rm: 87.5
              notes: "Back-offs are doubles. No grinding."
        - name: Weighted Dips
          sets:
            - reps: "3x5"
              percentage_1rm: 70
              notes: "Volume/maintenance."
    - weekday: Saturday
      session: Dip Priority
      exercises:
        - name: Weighted Dips
          sets:
            - reps: "1x1"
              percentage_1rm: 95
              notes: "Bump +1-2.5% from W5 single if it was <= RPE 8. Otherwise, repeat W5."
            - reps: "3x2"
              percentage_1rm: 87.5
              notes: "Back-offs are doubles. No grinding."
        - name: Weighted Pull-Ups
          sets:
            - reps: "3x4"
              percentage_1rm: 72.5
              notes: "Volume/maintenance work."
        - name: Weighted Muscle-Ups
          sets:
            - reps: "3-4x1"
              percentage_1rm: 60
              notes: "Light singles only."
        - name: Confidence Singles (WP or Dip)
          sets:
            - reps: "1x1"
              percentage_1rm: 95
              notes: "OPTIONAL. Take a single at 92.5-95% ONLY IF it would feel like RPE 8 or less."

- week_7:
    # Final heavy squat day, then minimal taper for upper-body.
    - weekday: Monday
      session: Squat Priority
      exercises:
        - name: Squat
          sets:
            - reps: "1x1"
              percentage_1rm: 92.5
              notes: "Bump +1–2.5% from W5 single if it was <= RPE 8. Otherwise, repeat W5."
            - reps: "3x3"
              percentage_1rm: 85
              notes: "Strength back-off sets."
        - name: Light Hinge (RDL/SLDL)
          sets:
            - reps: "2x5"
              percentage_1rm: 70
              notes: "Light technique focus."
    - weekday: Thursday
      session: WP + Dip (Taper)
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - reps: "1x1"
              percentage_1rm: 87.5
              notes: "Heavy-ish speed single (≤RPE7). If bar speed is great, you may go up to ~90%. No back-offs."
        - name: Weighted Dips
          sets:
            - reps: "1x1"
              percentage_1rm: 87.5
              notes: "Heavy-ish speed single (≤RPE7). If bar speed is great, you may go up to ~90%. No back-offs."
    - weekday: Saturday
      session: MU Technique Only
      exercises:
        - name: Weighted Muscle-Ups
          sets:
            - reps: "2-3x1"
              percentage_1rm: 55
              notes: "Crisp technique only (can go up to ~60% if perfect). Long rests."
        # No WP/Dip singles today—keep freshness for next week’s tests.

- week_8:
    # Test Week: prioritize WP + Dip; Squat = confidence single only.
    - weekday: Monday
      session: Squat Confidence Single (No Max)
      exercises:
        - name: Squat
          sets:
            - reps: "1x1"
              percentage_1rm: 70
              notes: "Warm-up"
            - reps: "1x1"
              percentage_1rm: 80
              notes: "Warm-up"
            - reps: "1x1"
              percentage_1rm: 90
              notes: "Warm-up"
            - reps: "1x1"
              percentage_1rm: 92.5
              notes: "Confidence single (92.5–95%). Stop here—no maxing to save recovery for WP/Dip."
    - weekday: Wednesday
      session: Weighted Pull-Ups Test
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - reps: "1x1"
              percentage_1rm: 90
              notes: "Warm-up single"
            - reps: "1x1"
              percentage_1rm: 95
              notes: "Opener"
            - reps: "1x1"
              percentage_1rm: 100
              notes: "Second (match PB)"
            - reps: "1x1"
              percentage_1rm: 102
              notes: "Third (102–103% only if second was clean)"
    - weekday: Friday
      session: Weighted Dips Test
      exercises:
        - name: Weighted Dips
          sets:
            - reps: "1x1"
              percentage_1rm: 90
              notes: "Warm-up single"
            - reps: "1x1"
              percentage_1rm: 95
              notes: "Opener"
            - reps: "1x1"
              percentage_1rm: 100
              notes: "Second (match PB)"
            - reps: "1x1"
              percentage_1rm: 102
              notes: "Third (102–103% only if second was clean)"
    - weekday: Saturday
      session: Weighted Muscle-Ups Test
      exercises:
        - name: Weighted Muscle-Ups
          sets:
            - reps: "1x1"
              percentage_1rm: 70
              notes: "Warm-up (progress through BW → ~70–80%)"
            - reps: "1x1"
              percentage_1rm: 90
              notes: "Last warm-up"
            - reps: "1x1"
              percentage_1rm: 100
              notes: "PB attempt"
            - reps: "1x1"
              percentage_1rm: 102
              notes: "Optional 102% if PB was snappy"
