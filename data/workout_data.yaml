- week_1:
    # Strength Block – Streetlifting Split with Wave and Linear Progression
    - weekday: Tuesday
      session: Pull Strength + Push Volume
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - notes: "Wave 1 – Controlled explosive reps; full ROM."
              percentage_1rm: 80
              reps: "1x3"
            - notes: "Wave 1 – Maintain bar speed and tight form."
              percentage_1rm: 85
              reps: "1x3"
            - notes: "Wave 1 – Top triple; stay clean under fatigue."
              percentage_1rm: 90
              reps: "1x3"
            - notes: "Wave 2 – Match previous intensity with sharp reps."
              percentage_1rm: 85
              reps: "1x2"
            - notes: "Wave 2 – Push but no grind; clean finish."
              percentage_1rm: 90
              reps: "1x2"
        - name: Weighted Dips
          sets:
            - notes: "Smooth controlled descent; avoid flaring."
              percentage_1rm: 65
              reps: "4x6"

    - weekday: Thursday
      session: Lower Strength + Muscle-Up (Heavy)
      exercises:
        - name: Squat
          sets:
            - notes: "Wave 1 – Maintain bracing and depth."
              percentage_1rm: 80
              reps: "1x3"
            - notes: "Wave 1 – Build pressure from the hole."
              percentage_1rm: 85
              reps: "1x3"
            - notes: "Wave 1 – Top triple; aggressive bar speed."
              percentage_1rm: 90
              reps: "1x3"
            - notes: "Wave 2 – Repeat with speed and stability."
              percentage_1rm: 85
              reps: "1x2"
            - notes: "Wave 2 – Final top double with crisp form."
              percentage_1rm: 90
              reps: "1x2"
        - name: Weighted Muscle-Ups
          sets:
            - notes: "Controlled swing, fast transition over bar."
              percentage_1rm: 85
              reps: "2x2"
            - notes: "Explosive power with clean lockout."
              percentage_1rm: 90
              reps: "2x2"

    - weekday: Friday
      session: Upper Volume Pull + Dip Heavy
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - notes: "Tight scap engagement, even pull."
              percentage_1rm: 75
              reps: "4x4"
        - name: Weighted Dips
          sets:
            - notes: "Controlled descent, strong lockout."
              percentage_1rm: 80
              reps: "5x3"

    - weekday: Sunday
      session: Recovery Squat + Speed Muscle-Up
      exercises:
        - name: Squat
          sets:
            - notes: "Tempo 3-0-1 or paused squats, stay snappy."
              percentage_1rm: 60
              reps: "3x5"
        - name: Weighted Muscle-Ups
          sets:
            - notes: "Every minute on the minute; crisp and fast reps."
              percentage_1rm: 65
              reps: "5x1"
