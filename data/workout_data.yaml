- week_1:
    # Strength Block – Advanced split with heavy lifts and accessory work
    - weekday: Tuesday
      session: Lower Body Strength
      exercises:
        - name: Back Squat
          sets:
            - notes: "Focus on explosive power with controlled descent."
              percentage_1rm: 80
              reps: "4x3"
        - name: Paused Squat
          sets:
            - notes: "Emphasize a strong pause at the bottom for stability."
              percentage_1rm: 75
              reps: "2x3"
        - name: Leg Press
          sets:
            - notes: "Focus on full range of motion and controlled execution."
              reps: "3x8"
        - name: Leg Extensions
          sets:
            - notes: "Moderate load; smooth, controlled movement."
              reps: "3x10"
        - name: Leg Curls
          sets:
            - notes: "Maintain a controlled tempo to target the hamstrings."
              reps: "3x10"
    - weekday: Thursday
      session: Upper Body Strength
      exercises:
        - name: Weighted Pull-Ups
          sets:
            - notes: "Focus on strict form and full range of motion."
              percentage_1rm: 80
              reps: "4x3"
        - name: Weighted Muscle-Ups
          sets:
            - notes: "Perform with explosive yet controlled movement."
              percentage_1rm: 80
              reps: "3x3"
        - name: Weighted Ring Dips
          sets:
            - notes: "Keep strict technique under load."
              percentage_1rm: 75
              reps: "3x6"
    - weekday: Saturday
      session: Active Recovery / Mobility
      exercises:
        - name: Mobility & Recovery Work
          sets:
            - notes: "25 minutes of dynamic stretching, handstands, foam rolling, and mobility drills."
