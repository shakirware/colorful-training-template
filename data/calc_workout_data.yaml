- week_1:
  - weekday: Wednesday
    session: Pull-Up Heavy + Dip Support
    exercises:
    - name: Weighted Pull-Ups
      calculation_mode: rep_table
      sets:
      - reps: 3
        percentage_1rm: 72.5
        notes: Entry wave triple. Target ~RPE 7. Same bar, grip, belt, ROM.
        weight: 82.5kg
        rep_table_percent_for_reps: 3.0
      - reps: 2
        percentage_1rm: 82.5
        notes: Entry wave double. Target ~RPE 7.5-8.
        weight: 87.5kg
        rep_table_percent_for_reps: 2.0
      - reps: 1
        percentage_1rm: 90.0
        notes: Entry wave single. Cap at RPE 8. If overshoots, reduce next set.
        weight: 73.75kg
        rep_table_fallback: training_max
        rep_table_error: 'Reps=1 not supported in rep table for ''Weighted Pull-Ups''.
          Supported reps: [2, 3, 4, 5, 6, 7, 8, 9, 10]'
      - reps: 2
        percentage_1rm: 82.5
        notes: Repeat double. Keep clean, no grind.
        weight: 87.5kg
        rep_table_percent_for_reps: 2.0
      - reps: 1
        percentage_1rm: 90.0
        notes: Repeat single only if first single was crisp.
        weight: 73.75kg
        rep_table_fallback: training_max
        rep_table_error: 'Reps=1 not supported in rep table for ''Weighted Pull-Ups''.
          Supported reps: [2, 3, 4, 5, 6, 7, 8, 9, 10]'
    - name: Weighted Dips
      calculation_mode: rep_table
