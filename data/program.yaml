- week_1:
    - weekday: Tuesday
      session: Dip Bridge Heavy + Squat Light
      exercises:
        - name: Weighted Dips
          calculation_mode: rep_table
          sets:
            - reps: "1x3"
              percentage_1rm: 83
              notes: "Bridge entry session. Top triple. Target RPE 7."
            - reps: "2x3"
              percentage_1rm: 78
              notes: "Back-off triples. Target RPE 6-6.5."
            - reps: "1x1"
              percentage_1rm: 88
              notes: "Optional only if warm-ups feel great and single is clearly crisp. Keep at RPE 7 or below."
        - name: Squat
          calculation_mode: rep_table
          sets:
            - reps: "2x4"
              percentage_1rm: 60
              notes: "Light support only. Technical and restorative. Target RPE 6."
        - name: Hamstring Curls
          sets:
            - reps: "2x10"
              notes: "Easy-moderate only."
        - name: Trunk
          sets:
            - reps: "2x10"
              notes: "Controlled only."

    - weekday: Friday
      session: Pull Heavy + Dip Light + Muscle-Up Technique
      exercises:
        - name: Weighted Pull-Ups
          calculation_mode: rep_table
          sets:
            - reps: "1x1"
              percentage_1rm: 90
              notes: "Top single. Keep crisp. Target RPE 7.5."
            - reps: "1x3"
              percentage_1rm: 84
              notes: "Top triple. Target RPE 7-7.5."
            - reps: "2x3"
              percentage_1rm: 79
              notes: "Back-off triples. Target RPE 6.5-7."
        - name: Weighted Muscle-Ups
          calculation_mode: rep_table
          sets:
            - reps: "4x1"
              percentage_1rm: 50
              notes: "Technique only. Fast and clean. Add 1-2 extra singles only if quality stays high."
        - name: Weighted Dips
          calculation_mode: rep_table
          sets:
            - reps: "2x5"
              percentage_1rm: 60
              notes: "Light support only. Target RPE 6."
        - name: Face Pulls or Cable External Rotations
          sets:
            - reps: "2x12"
              notes: "Easy-moderate only."

    - weekday: Sunday
      session: Squat Support + Recovery
      exercises:
        - name: Paused Squat
          calculation_mode: rep_table
          sets:
            - reps: "4x4"
              percentage_1rm: 68
              notes: "1-2 second pause. Technical only. Target RPE 6-6.5."
        - name: Hamstring Curls
          sets:
            - reps: "2x12"
              notes: "Easy-moderate only."
        - name: Trunk
          sets:
            - reps: "2x10"
              notes: "Controlled."

