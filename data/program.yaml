- week_1:
    - weekday: Thursday
      session: Day 1 - Weighted Muscle-Up Wave and Weighted Dip AMRAP
      exercises:
        - name: Weighted Muscle-Ups
          calculation_mode: training_max
          sets:
            - reps: 3
              percentage_1rm: 82.5
              notes: "Wave set 1; crisp and technically clean"
            - reps: 2
              percentage_1rm: 87.5
              notes: "Wave set 2; strong, no transition breakdown"
            - reps: 1
              percentage_1rm: 92.5
              notes: "Wave set 3; fast heavy single, no grind"

        - name: Weighted Dips
          calculation_mode: training_max
          sets:
            - reps: 10
              percentage_1rm: 85
              notes: "PLACEHOLDER REPS: perform one capped AMRAP set for 3-8 clean reps, stopping at 1-2 RIR"

        - name: Dumbbell Bench Press
          sets:
            - reps: "3x8"
              notes: "Controlled eccentric; 1-2 RIR; no excessive pec stretch"

        - name: Cable Flyes
          sets:
            - reps: "3x15"
              notes: "Controlled stretch and squeeze; RPE 7-8"

        - name: Scapular Push-Ups
          sets:
            - reps: "3x15"
              notes: "Full protraction at the top; ribs controlled"

        - name: External Rotations
          sets:
            - reps: "2x15"
              notes: "Light and controlled"

        - name: Internal Rotations
          sets:
            - reps: "2x15"
              notes: "Light and controlled"

        - name: Stretching
          sets:
            - reps: 1
              notes: "Stretching at end of session"

    - weekday: Saturday
      session: Day 2 - Squat Wave and Weighted Pull-Up AMRAP
      exercises:
        - name: Squat
          calculation_mode: training_max
          sets:
            - reps: 3
              percentage_1rm: 80
              notes: "Wave set 1; crisp brace and clean bar path"
            - reps: 2
              percentage_1rm: 85
              notes: "Wave set 2; strong, no back-pain escalation"
            - reps: 1
              percentage_1rm: 90
              notes: "Wave set 3; no grind; stop if back does not feel clean"

        - name: Weighted Pull-Ups
          calculation_mode: training_max
          sets:
            - reps: 10
              percentage_1rm: 85
              notes: "PLACEHOLDER REPS: perform one capped AMRAP set for 3-8 clean reps, stopping at 1-2 RIR"

        - name: Leg Press
          sets:
            - reps: 10
              notes: "Heavy top set at RPE 8-9 with 1 RIR; controlled depth and no pelvic tuck"
            - reps: "2x12"
              notes: "Back-off sets at about 90% of the top-set load"

        - name: Back Extensions
          sets:
            - reps: "4x8"
              notes: "Heavy; neutral spine, controlled eccentric, no hyperextension; RPE 8"

        - name: Hamstring Curls
          sets:
            - reps: "3x10"
              notes: "Controlled hard sets; 1-2 RIR"

        - name: Stretching
          sets:
            - reps: 1
              notes: "Stretching at end of session"

    - weekday: Monday
      session: Day 3 - Weighted Muscle-Up AMRAP and Weighted Pull-Up Wave
      exercises:
        - name: Weighted Muscle-Ups
          calculation_mode: training_max
          sets:
            - reps: 10
              percentage_1rm: 85
              notes: "PLACEHOLDER REPS: perform one capped AMRAP set for 3-8 perfect reps, stopping at 1-2 RIR; end set when transition quality changes"

        - name: Weighted Pull-Ups
          calculation_mode: training_max
          sets:
            - reps: 3
              percentage_1rm: 82.5
              notes: "Wave set 1; crisp"
            - reps: 2
              percentage_1rm: 87.5
              notes: "Wave set 2; strong"
            - reps: 1
              percentage_1rm: 92.5
              notes: "Wave set 3; no grind; reduce to 90% if muscle-up AMRAP was unusually fatiguing"

        - name: Dumbbell Bench Press
          sets:
            - reps: "3x10"
              notes: "Volume-focused; controlled eccentric; 1-2 RIR"

        - name: Cable Flyes
          sets:
            - reps: "3x15"
              notes: "Smooth reps; no aggressive stretch"

        - name: Back Extensions
          sets:
            - reps: "3x15"
              notes: "Lighter tolerance work than Saturday; controlled throughout"

        - name: Stretching
          sets:
            - reps: 1
              notes: "Stretching at end of session"

    - weekday: Wednesday
      session: Day 4 - Squat AMRAP and Weighted Dip Wave
      exercises:
        - name: Squat
          calculation_mode: training_max
          sets:
            - reps: 10
              percentage_1rm: 82.5
              notes: "PLACEHOLDER REPS: perform one capped AMRAP set for 3-8 clean reps, stopping at 1-2 RIR; if back pain appears or increases, replace with 3x3-5 at 70-75%"

        - name: Weighted Dips
          calculation_mode: training_max
          sets:
            - reps: 3
              percentage_1rm: 82.5
              notes: "Wave set 1; controlled depth"
            - reps: 2
              percentage_1rm: 87.5
              notes: "Wave set 2; strong shoulder position"
            - reps: 1
              percentage_1rm: 92.5
              notes: "Wave set 3; no grind or pec/front-shoulder irritation"

        - name: Leg Press
          sets:
            - reps: "4x12"
              notes: "Volume day; controlled deep reps; RPE 8; no pelvic tuck"

        - name: Back Extensions
          sets:
            - reps: "3x12"
              notes: "Moderate volume; neutral spine and controlled eccentric"

        - name: Hamstring Curls
          sets:
            - reps: "3x10"
              notes: "Controlled hard sets; 1-2 RIR"

        - name: Cable Flyes
          sets:
            - reps: "2x15"
              notes: "Lighter pump work; no aggressive stretch"

        - name: Stretching
          sets:
            - reps: 1
              notes: "Stretching at end of session"

